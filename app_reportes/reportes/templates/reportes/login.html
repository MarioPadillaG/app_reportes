{% extends 'reportes/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card shadow border-0">
            <div class="card-header bg-dark text-white text-center py-3">
                <h4 class="mb-0">Iniciar Sesión</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Usuario</label>
                        <input type="text" name="username" class="form-control" placeholder="Tu nombre de usuario" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" name="password" class="form-control" placeholder="********" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary fw-bold">Entrar</button>
                    </div>
                </form>
                {% if form.errors %}
                    <div class="alert alert-danger mt-3 small">Usuario o contraseña incorrectos.</div>
                {% endif %}
                <hr>
                <div class="text-center">
                    <p class="mb-0">¿No tienes cuenta? <a href="{% url 'registro' %}" class="text-primary fw-bold">Regístrate aquí</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
