{% extends 'reportes/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Nuevo Reporte de Fallo</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success">Enviar Reporte</button>
                        <a href="{% url 'lista_reportes' %}" class="btn btn-secondary">Ver mis reportes</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
